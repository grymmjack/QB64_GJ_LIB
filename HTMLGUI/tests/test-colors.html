<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Colors, Borders &amp; Spacing</title>
</head>
<body>
  <h3>Color Palette</h3>
  <div class="palette">
    <div class="swatch sw-red">Red</div>
    <div class="swatch sw-orange">Orange</div>
    <div class="swatch sw-yellow">Yellow</div>
    <div class="swatch sw-green">Green</div>
    <div class="swatch sw-cyan">Cyan</div>
    <div class="swatch sw-blue">Blue</div>
    <div class="swatch sw-purple">Purple</div>
    <div class="swatch sw-pink">Pink</div>
  </div>
  <h3>Border Styles</h3>
  <div class="border-demos">
    <div class="bx bx-thin">1px border</div>
    <div class="bx bx-medium">2px border</div>
    <div class="bx bx-thick">3px border</div>
    <div class="bx bx-colored">Multi-color</div>
  </div>
  <h3>Spacing &amp; Margins</h3>
  <div class="spacing-demo">
    <div class="sp-box sp-small">P: 4px M: 2px</div>
    <div class="sp-box sp-medium">P: 8px M: 4px</div>
    <div class="sp-box sp-large">P: 16px M: 8px</div>
  </div>
  <h3>Opacity Test</h3>
  <div class="opacity-row">
    <div class="op-box op-100">100%</div>
    <div class="op-box op-75">75%</div>
    <div class="op-box op-50">50%</div>
    <div class="op-box op-25">25%</div>
  </div>
</body>
</html>
