<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tables</title>
</head>
<body>
  <h2>Inventory System</h2>
  <table class="data-table">
    <tr>
      <th>Item</th>
      <th>Type</th>
      <th>Qty</th>
      <th>Status</th>
    </tr>
    <tr>
      <td>Iron Sword</td>
      <td>Weapon</td>
      <td>1</td>
      <td class="status-ok">Equipped</td>
    </tr>
    <tr class="alt-row">
      <td>Health Potion</td>
      <td>Consumable</td>
      <td>5</td>
      <td class="status-ok">Ready</td>
    </tr>
    <tr>
      <td>Old Shield</td>
      <td>Armor</td>
      <td>1</td>
      <td class="status-warn">Damaged</td>
    </tr>
    <tr class="alt-row">
      <td>Dragon Scale</td>
      <td>Material</td>
      <td>3</td>
      <td class="status-rare">Rare</td>
    </tr>
    <tr>
      <td>Torch</td>
      <td>Tool</td>
      <td>2</td>
      <td class="status-ok">Active</td>
    </tr>
  </table>
  <p class="footer-note">5 items in inventory</p>
</body>
</html>
