<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Float Layout</title>
</head>
<body>
  <h2>Float Layout Test</h2>
  <div class="float-container">
    <nav class="float-nav">
      <p>Navigation</p>
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>
    <div class="float-sidebar">
      <p>Side Panel</p>
      <div class="widget">
        <h4>Tools</h4>
        <p>Brush</p>
        <p>Eraser</p>
        <p>Fill</p>
      </div>
    </div>
    <div class="float-main">
      <p>Main Content Area</p>
      <p>This section fills remaining space after the floated elements.</p>
    </div>
  </div>
  <hr>
  <h3>Multi-Float Row</h3>
  <div class="chip-row">
    <div class="chip chip-1">QB64</div>
    <div class="chip chip-2">HTML</div>
    <div class="chip chip-3">CSS</div>
    <div class="chip chip-4">Pixel</div>
    <div class="chip chip-5">Art</div>
  </div>
</body>
</html>
