<!DOCTYPE html>
<html>
<head>
    <title>Gradient Tests</title>
    <link rel="stylesheet" href="test-gradients.css">
</head>
<body>
    <h1>CSS Gradient Tests</h1>

    <div class="section">
        <h2>Linear Gradients</h2>
        <div class="gradient-row">
            <div class="grad-box grad-lr">L-R</div>
            <div class="grad-box grad-tb">T-B</div>
            <div class="grad-box grad-diag">Diag</div>
            <div class="grad-box grad-angle">45deg</div>
        </div>
    </div>

    <div class="section">
        <h2>Multi-Stop Gradients</h2>
        <div class="gradient-row">
            <div class="grad-box grad-rainbow">Rainbow</div>
            <div class="grad-box grad-sunset">Sunset</div>
        </div>
    </div>

    <div class="section">
        <h2>Radial Gradients</h2>
        <div class="gradient-row">
            <div class="grad-box grad-radial">Radial</div>
            <div class="grad-box grad-circle">Circle</div>
            <div class="grad-box grad-offcenter">Off-center</div>
        </div>
    </div>

    <div class="section">
        <h2>Background Shorthand</h2>
        <div class="gradient-row">
            <div class="grad-box grad-shorthand">Shorthand</div>
        </div>
    </div>
</body>
</html>
