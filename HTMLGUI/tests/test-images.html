<!DOCTYPE html>
<html>
<head>
    <title>Image Tests</title>
</head>
<body>
    <h1>Image & Background Image Tests</h1>

    <div class="section">
        <h2>Background Images</h2>
        <div class="img-row">
            <div class="box bg-norepeat">No Repeat</div>
            <div class="box bg-repeat">Repeat</div>
            <div class="box bg-cover">Cover</div>
        </div>
    </div>

    <div class="section">
        <h2>Background Position</h2>
        <div class="img-row">
            <div class="box bg-center">Center</div>
            <div class="box bg-topright">Top Right</div>
            <div class="box bg-bottomleft">Bottom Left</div>
        </div>
    </div>

    <div class="section">
        <h2>Gradient + Color Fallback</h2>
        <div class="img-row">
            <div class="box bg-grad-color">Gradient over Color</div>
            <div class="box bg-repeat-x">Repeat-X</div>
            <div class="box bg-repeat-y">Repeat-Y</div>
        </div>
    </div>

    <div class="section">
        <h2>Combined Features</h2>
        <div class="combined-box">
            <p>This box has a linear gradient background with text content overlaid.</p>
        </div>
    </div>
</body>
</html>
