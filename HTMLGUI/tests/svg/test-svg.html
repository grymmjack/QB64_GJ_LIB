<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="test-svg.css">
</head>
<body>
  <h3>SVG Basic Shapes</h3>

  <div class="svg-section">
    <h4>Rectangles</h4>
    <svg width="200" height="60">
      <rect x="5" y="5" width="50" height="40" fill="#e94560" stroke="#ffffff" stroke-width="2"></rect>
      <rect x="70" y="5" width="50" height="40" fill="#3fb950" stroke="#58a6ff" stroke-width="1"></rect>
      <rect x="135" y="10" width="30" height="30" fill="none" stroke="#ffcc00" stroke-width="2"></rect>
    </svg>
  </div>

  <div class="svg-section">
    <h4>Circles</h4>
    <svg width="200" height="60">
      <circle cx="30" cy="30" r="25" fill="#58a6ff" stroke="#ffffff" stroke-width="1"></circle>
      <circle cx="90" cy="30" r="20" fill="#e94560" stroke="#3fb950" stroke-width="2"></circle>
      <circle cx="150" cy="30" r="15" fill="none" stroke="#ffcc00" stroke-width="2"></circle>
    </svg>
  </div>

  <div class="svg-section">
    <h4>Ellipses</h4>
    <svg width="200" height="60">
      <ellipse cx="50" cy="30" rx="40" ry="20" fill="#3fb950" stroke="#ffffff" stroke-width="1"></ellipse>
      <ellipse cx="150" cy="30" rx="30" ry="25" fill="none" stroke="#e94560" stroke-width="2"></ellipse>
    </svg>
  </div>

  <div class="svg-section">
    <h4>Lines</h4>
    <svg width="200" height="60">
      <line x1="5" y1="5" x2="195" y2="55" stroke="#58a6ff" stroke-width="2"></line>
      <line x1="5" y1="55" x2="195" y2="5" stroke="#e94560" stroke-width="1"></line>
      <line x1="100" y1="5" x2="100" y2="55" stroke="#3fb950" stroke-width="2"></line>
    </svg>
  </div>

  <div class="svg-section">
    <h4>Mixed Shapes</h4>
    <svg width="250" height="80">
      <rect x="5" y="5" width="70" height="70" fill="#1a1a2e" stroke="#58a6ff" stroke-width="1"></rect>
      <circle cx="40" cy="40" r="25" fill="#e94560" stroke="none" stroke-width="0"></circle>
      <line x1="90" y1="5" x2="90" y2="75" stroke="#444444" stroke-width="1"></line>
      <ellipse cx="160" cy="40" rx="50" ry="30" fill="#1a2e1a" stroke="#3fb950" stroke-width="2"></ellipse>
      <rect x="130" y="25" width="60" height="30" fill="none" stroke="#ffcc00" stroke-width="1"></rect>
    </svg>
  </div>
</body>
</html>
