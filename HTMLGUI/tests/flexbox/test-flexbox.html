<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flexbox Layout</title>
  <link rel="stylesheet" href="test-flexbox.css">
</head>
<body>
  <div class="header">
    <span class="logo">FLEXBOX</span>
    <span class="version">v1.0</span>
  </div>
  <div class="row">
    <div class="card card-red">
      <h3>Panel A</h3>
      <p>Flex grow 1</p>
    </div>
    <div class="card card-green">
      <h3>Panel B</h3>
      <p>Flex grow 2</p>
    </div>
    <div class="card card-blue">
      <h3>Panel C</h3>
      <p>Flex grow 1</p>
    </div>
  </div>
  <div class="column-row">
    <div class="sidebar">
      <p>Sidebar</p>
      <p>Column</p>
      <p>Direction</p>
    </div>
    <div class="main-content">
      <p>Main content area with flex-direction: row and gap spacing between items.</p>
    </div>
  </div>
  <div class="center-box">
    <p>Centered with justify-content and align-items</p>
  </div>
</body>
</html>
