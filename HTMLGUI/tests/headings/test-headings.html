<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Headings &amp; Typography</title>
  <link rel="stylesheet" href="test-headings.css">
</head>
<body>
  <h1>Heading Level 1</h1>
  <h2>Heading Level 2</h2>
  <h3>Heading Level 3</h3>
  <h4>Heading Level 4</h4>
  <h5>Heading Level 5</h5>
  <h6>Heading Level 6</h6>
  <hr>
  <p>This is a <strong>bold paragraph</strong> with <em>italic emphasis</em> and a <a href="#">hyperlink</a> in the middle of it.</p>
  <p>Second paragraph demonstrates <b>bold</b>, <i>italic</i>, and <span class="highlight">inline span styling</span> together.</p>
</body>
</html>
