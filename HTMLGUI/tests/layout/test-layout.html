<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Complex Layout - Dashboard</title>
  <link rel="stylesheet" href="test-layout.css">
</head>
<body>
  <div class="topbar">
    <span class="app-title">PIXEL DASHBOARD</span>
    <div class="nav-links">
      <a href="#">Home</a>
      <a href="#">Projects</a>
      <a href="#">Settings</a>
    </div>
  </div>
  <div class="layout">
    <div class="sidebar">
      <div class="menu-item active">Overview</div>
      <div class="menu-item">Canvas</div>
      <div class="menu-item">Layers</div>
      <div class="menu-item">Palette</div>
      <div class="menu-item">Export</div>
    </div>
    <div class="content">
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-num">128</div>
          <div class="stat-label">Width</div>
        </div>
        <div class="stat-card">
          <div class="stat-num">128</div>
          <div class="stat-label">Height</div>
        </div>
        <div class="stat-card">
          <div class="stat-num">4</div>
          <div class="stat-label">Layers</div>
        </div>
        <div class="stat-card">
          <div class="stat-num">32</div>
          <div class="stat-label">Colors</div>
        </div>
      </div>
      <div class="details">
        <h3>Recent Activity</h3>
        <div class="activity-list">
          <p>Saved project.draw</p>
          <p>Added Layer 4</p>
          <p>Imported palette</p>
          <p>Exported as BMP</p>
        </div>
      </div>
    </div>
  </div>
  <div class="footer">
    <span>DRAW v0.8.0</span>
    <span>Ready</span>
  </div>
</body>
</html>
